version: 0.1.0
repository: https://github.com/Nijify/canvas_renderer_flutter
issue_tracker: https://github.com/Nijify/canvas_renderer_flutter/issues
homepage: https://nijify.com
topics:
  - canvas
  - flutter
  - graphics
  - renderer

environment:
