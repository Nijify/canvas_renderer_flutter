    sdk: flutter
  # temporary Git dependency
  canvas_core:
    git:
      url: https://github.com/Nijify/canvas_core.git
      ref: master

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
